name: Java CI/CD to Docker Hub

on:
  push:
    branches: [ "main" ] # Führt den Workflow bei jedem Push in den main-Branch aus

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Code auschecken
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Java installieren (für die Tests)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Anwendung testen (mit Maven)
    - name: Test with Maven
      run: mvn test

    # 4. Bei Docker Hub einloggen
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. Docker Image bauen und pushen
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # ACHTUNG: Passe deinen Docker-Hub Namen und den Image-Namen hier an!
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/m347-ref-card-01:latest