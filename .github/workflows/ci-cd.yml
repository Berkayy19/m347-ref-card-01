name: Java CI/CD to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Code auschecken
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Java 21 installieren (für die Tests)
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    # 3. Anwendung testen (mit Maven)
    - name: Test with Maven
      run: mvn test

    # 4. Bei Docker Hub einloggen
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. Docker Image bauen und pushen
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # Verwendet deinen GitHub Secret Benutzernamen (berkaay19)
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/m347-ref-card-01:latest